name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Verify generated token files are up to date
        run: |
          python3 tools/generate.py
          if ! git diff --quiet; then
            echo "::error::Generated *.g.cs files are stale. Run 'python3 tools/generate.py' and commit."
            git --no-pager diff --stat
            exit 1
          fi
